<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Wall</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-size:110%;font-family:"Courier New",monospace;background:#f0ebe2;width:100%;}
#ab{width:100%;display:flex;flex-direction:column;background:#f0ebe2;overflow:hidden;}

/* ROW 1 */
#tb1{flex:0 0 44px;min-height:44px;max-height:44px;background:#faf8f5;border-bottom:1px solid #e0d8cc;display:flex;align-items:center;padding:0 14px;overflow:hidden;}
#abt{font-size:.72rem;font-weight:bold;letter-spacing:3px;text-transform:uppercase;color:#2a1a0a;white-space:nowrap;padding-right:12px;border-right:1px solid #e0d8cc;margin-right:10px;flex-shrink:0;}
.dv{width:1px;height:20px;background:#e0d8cc;margin:0 6px;flex-shrink:0;}
.btn{background:transparent;color:#2a1a0a;border:1px solid #c8c0b4;padding:3px 9px;cursor:pointer;font-size:.58rem;font-family:"Courier New",monospace;letter-spacing:.8px;text-transform:uppercase;user-select:none;touch-action:manipulation;transition:background .12s,color .12s,border-color .12s;white-space:nowrap;height:26px;display:inline-flex;align-items:center;}
.btn+.btn{margin-left:3px;}
.btn:hover{color:#faf8f5;border-color:transparent;}
#surprise{border-color:#c8d0a0;color:#2a3a10;font-style:italic;}
.sr{display:flex;align-items:center;gap:4px;margin:0 6px;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;color:#4a3828;white-space:nowrap;}
#ss{width:52px;accent-color:#c8a060;touch-action:none;}
#sv{min-width:28px;font-size:.58rem;color:#2a1a0a;font-weight:bold;}
#tb1sp{flex:1;}

/* ROW 2 */
#tb2{flex:0 0 40px;min-height:40px;max-height:40px;background:#faf8f5;border-bottom:1.5px solid #c8c0b4;display:flex;align-items:center;justify-content:flex-end;padding:0 14px;gap:5px;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;}#tb2::-webkit-scrollbar{display:none;}
.rlbl{font-size:.38rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;white-space:nowrap;flex-shrink:0;}
.rdv{width:1px;height:12px;background:#e0d8cc;flex-shrink:0;}
#sprow{display:flex;align-items:center;gap:3px;}
.spsw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .12s;background-size:cover;background-position:center;}
.spsw:hover{transform:scale(1.2);}
.spsw.act{border-color:#2a1a0a;}
#spshuf{height:16px;border-radius:8px;border:1px solid #6a5040;cursor:pointer;background:#f5f0e8;font-size:.34rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;font-weight:bold;padding:0 5px;flex-shrink:0;}
#spshuf:hover{background:#3234f1;color:#faf8f5;border-color:#3234f1;}
.bgsw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .12s;}
.bgsplit{overflow:hidden;}
.bgsw:hover{transform:scale(1.2);}
.bgsw.act{border-color:#2a1a0a;}
.bgdv{width:1px;height:12px;background:#e0d8cc;flex-shrink:0;}
#photobtn{height:16px;border-radius:8px;border:1.5px solid #6a5040;cursor:pointer;background:#f5f0e8;font-size:.34rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;font-weight:bold;padding:0 6px;white-space:nowrap;flex-shrink:0;}
#photobtn:hover{background:#c8882a;color:#faf8f5;border-color:#c8882a;}
#photobtn.act{border-color:#2a1a0a;background:#e8e0d4;}

/* MAIN */
#main{display:flex;overflow:hidden;width:100%;}
#tray{width:162px;flex-shrink:0;background:#ede8e0;border-right:1.5px solid #c8c0b4;display:flex;flex-direction:column;overflow:hidden;}
#trays{flex:1;overflow-y:scroll;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:5px;}
#trays::-webkit-scrollbar{width:3px;}
#trays::-webkit-scrollbar-thumb{background:#c8c0b4;}
#trayh{font-size:.4rem;letter-spacing:2px;text-transform:uppercase;color:#6a5840;font-weight:bold;padding:0 2px 4px;border-bottom:1px solid #d8d0c4;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
#shuf{background:none;border:1px solid #c8c0b4;font-size:.4rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#6a5040;padding:2px 4px;cursor:pointer;}
#shuf:hover{background:#f74ba1;color:#fff;border-color:#f74ba1;}
#tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
.ti{cursor:pointer;border:1px solid transparent;padding:2px;background:#faf8f5;display:flex;align-items:center;justify-content:center;min-height:54px;user-select:none;touch-action:manipulation;}
.ti:hover{border-color:#d4a870;background:#fdf8f0;}
.ti img{max-width:100%;max-height:58px;display:block;pointer-events:none;}
#cw{flex:1;min-width:0;background:#f0ebe2;display:flex;align-items:center;justify-content:center;touch-action:none;padding:8px;overflow:hidden;}
#cv{position:relative;background:#faf8f5;border:1px solid #c8c0b4;box-shadow:2px 2px 0 #d4cbbf;overflow:hidden;touch-action:none;isolation:isolate;}
#cvbg{position:absolute;inset:0;pointer-events:none;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;}
.sp{position:absolute;cursor:grab;user-select:none;touch-action:none;transform-origin:center center;z-index:1;}
.sp:active{cursor:grabbing;}
.sp.sel{outline:1px dashed #d4a870;outline-offset:3px;}
.sp img{display:block;width:100%;height:100%;pointer-events:none;}
.ghost{position:fixed;pointer-events:none;z-index:999999;opacity:.72;top:0;left:0;}
.hnd{position:absolute;width:11px;height:11px;border:1.5px solid #c8a060;background:#fdf8f0;z-index:9999;display:none;touch-action:none;}
#sh{cursor:se-resize;bottom:-5px;right:-5px;}
#rh{cursor:crosshair;top:-18px;left:50%;margin-left:-5px;border-radius:50%;background:#e8c070;border-color:#c8a050;}

/* FOOTER */
#foot{flex:0 0 36px;min-height:36px;max-height:36px;background:#faf8f5;border-top:1px solid #e0d8cc;display:flex;align-items:center;justify-content:space-between;padding:0 14px;overflow:hidden;}
#fcredit{font-size:.5rem;letter-spacing:1.5px;text-transform:uppercase;color:#8a7868;font-style:italic;}
#fcredit span{color:#4a3020;font-weight:bold;font-style:normal;}
#facts{display:flex;align-items:center;gap:5px;}
.fbt{background:transparent;color:#2a1a0a;border:1px solid #c8c0b4;padding:3px 10px;cursor:pointer;font-size:.58rem;font-family:"Courier New",monospace;letter-spacing:.8px;text-transform:uppercase;transition:all .12s;white-space:nowrap;height:24px;display:inline-flex;align-items:center;}
.fbt:hover{background:#2a1a0a;color:#faf8f5;}
#fclr:hover{background:#bf1f1c!important;color:#faf8f5!important;}
#fwall:hover{background:#5f4096!important;color:#faf8f5!important;}
#fsave:hover{background:#c8882a!important;color:#faf8f5!important;}

/* WALL */
#wall{background:#faf8f5;border-top:1.5px solid #c8c0b4;padding:14px;}
#wallh{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
#wallt{font-size:.52rem;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#2a1a0a;}
#walls{font-size:.47rem;letter-spacing:1px;text-transform:uppercase;color:#9a8878;}
#wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
.wi{display:flex;flex-direction:column;gap:3px;}
.wt{aspect-ratio:4/3;background:#e8e0d4;border:1px solid #e0d8cc;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.wt:hover{border-color:#c8a882;}
.wt img{width:100%;height:100%;object-fit:cover;display:block;}
.wt .wph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.35rem;letter-spacing:2px;text-transform:uppercase;color:#b0a890;}
.wn{font-size:.4rem;letter-spacing:1px;text-transform:uppercase;color:#8a7868;text-align:center;}
.wd{background:none;border:none;font-size:.35rem;letter-spacing:1px;text-transform:uppercase;color:#c8c0b4;cursor:pointer;font-family:"Courier New",monospace;display:block;width:100%;text-align:center;}
.wd:hover{color:#bf1f1c;}
.we{font-size:.47rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;padding:14px 0;white-space:nowrap;}
#wpager{display:none;align-items:center;gap:12px;margin-top:12px;justify-content:center;}
.pbt{background:transparent;border:1px solid #c8c0b4;color:#2a1a0a;padding:4px 14px;cursor:pointer;font-size:.47rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;}
.pbt:hover{background:#2a1a0a;color:#faf8f5;}
#wpage{font-size:.4rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;}

/* MODALS */
#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);background:#2a1a0a;color:#faf8f5;padding:8px 20px;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;font-family:"Courier New",monospace;opacity:0;transition:opacity .4s;pointer-events:none;z-index:99999;white-space:nowrap;}
#toast.show{opacity:1;}
#nm{display:none;position:fixed;inset:0;background:rgba(42,26,10,.5);z-index:88888;align-items:center;justify-content:center;}
#nm.open{display:flex;}
#nmi{background:#faf8f5;border:1px solid #c8c0b4;padding:26px 22px;max-width:360px;width:90%;box-shadow:4px 4px 0 #d4cbbf;}
#nmt{font-size:.72rem;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#2a1a0a;margin-bottom:5px;}
#nms{font-size:.47rem;letter-spacing:1px;text-transform:uppercase;color:#9a8878;margin-bottom:14px;}
#nminput{width:100%;border:1px solid #c8c0b4;background:#faf8f5;font-family:"Courier New",monospace;font-size:.72rem;color:#2a1a0a;padding:7px 9px;outline:none;margin-bottom:12px;}
#nminput:focus{border-color:#c8a882;}
#nmbtns{display:flex;gap:7px;}
.nmb{flex:1;background:transparent;border:1px solid #c8c0b4;padding:7px;cursor:pointer;font-size:.47rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;transition:all .12s;}
.nmb:hover{background:#2a1a0a;color:#faf8f5;}
#nmanon{border-color:#c8d0a0;color:#2a3a10;}
#nmanon:hover{background:#5fa610;color:#faf8f5;border-color:#5fa610;}
#nmsub{border-color:#c8b0e0;color:#3a1060;}
#nmsub:hover{background:#5f4096;color:#faf8f5;border-color:#5f4096;}
#lb{display:none;position:fixed;inset:0;background:rgba(42,26,10,.82);z-index:99990;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lbi{position:relative;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:8px;}
#lbi img{max-width:90vw;max-height:78vh;object-fit:contain;display:block;}
#lbn{font-size:.47rem;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,245,.7);}
#lbc{position:absolute;top:-13px;right:-13px;background:#2a1a0a;color:#faf8f5;border:none;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
#ty{display:none;position:fixed;inset:0;z-index:99990;align-items:center;justify-content:center;background:rgba(10,6,20,.82);}
#ty.open{display:flex;}
#tybox{position:relative;width:min(540px,88vw);overflow:hidden;box-shadow:0 0 60px 20px rgba(255,220,40,.18);}
#tybg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.72) saturate(1.2);z-index:0;}
#tyglow{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 70% 55% at 50% 52%,rgba(255,220,30,.38) 0%,transparent 72%);pointer-events:none;}
#tycontent{position:relative;z-index:2;padding:52px 36px 44px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;}
#tytitle{font-size:clamp(1.3rem,5vw,2.1rem);font-family:"Courier New",monospace;font-weight:bold;letter-spacing:3px;text-transform:uppercase;line-height:1.25;background:linear-gradient(90deg,#fff 0%,#ffe566 20%,#fff 35%,#ffe566 55%,#fff 70%,#ffe566 85%,#fff 100%);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glitter 2.4s linear infinite;filter:drop-shadow(0 0 8px rgba(255,220,40,.7));}
@keyframes glitter{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
#tysub{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.72);font-family:"Courier New",monospace;}
.spark{position:absolute;pointer-events:none;width:4px;height:4px;border-radius:50%;background:#ffe566;animation:sparkle var(--d,1.2s) ease-out var(--delay,0s) infinite;opacity:0;}
@keyframes sparkle{0%{opacity:0;transform:translate(0,0) scale(0);}20%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1);}80%{opacity:.6;}100%{opacity:0;transform:translate(calc(var(--tx)*2.2),calc(var(--ty)*2.2)) scale(0);}}
#tyclose{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#faf8f5;padding:8px 28px;cursor:pointer;font-size:.52rem;font-family:"Courier New",monospace;letter-spacing:2px;text-transform:uppercase;}
#tyclose:hover{background:rgba(255,220,40,.22);}

@keyframes si{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
.ent{animation:si .2s ease-out forwards;}

/* MOBILE */
@media(max-width:768px){
  #tb1{flex-wrap:wrap;height:auto;max-height:none;padding:5px 8px;gap:3px;}
  #tb1sp{display:none;}
  #mute{display:none;}
  .btn{padding:3px 6px;font-size:.5rem;height:24px;}
  #tb2{height:auto;min-height:34px;max-height:none;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;flex-wrap:nowrap;}
  #tb2::-webkit-scrollbar{display:none;}
  #main{flex-direction:column;}
  #tray{width:100%!important;height:82px!important;border-right:none;border-bottom:1.5px solid #c8c0b4;}
  #trays{overflow-x:auto;overflow-y:hidden;touch-action:pan-x;padding:4px 5px;}
  #trays::-webkit-scrollbar{display:none;}
  #trayh{display:none;}
  #tg{display:flex;flex-direction:row;gap:3px;grid-template-columns:none;flex-wrap:nowrap;}
  .ti{min-width:64px;min-height:64px;flex-shrink:0;}
  #foot{flex-wrap:wrap;height:auto;min-height:40px;max-height:none;padding:5px 10px;}
  #fcredit{font-size:.38rem;}
}
</style>
</head>
<body>
<input type="file" id="pbgi" accept="image/*" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">
<div id="ab">
  <div id="tb1">
    <span id="abt">Art Wall</span>
    <button class="btn" id="surprise">✦ surprise me</button>
    <div class="dv"></div>
    <div class="sr"><span>size</span><input type="range" id="ss" min="20" max="200" value="100"><span id="sv">100%</span></div>
    <div class="dv"></div>
    <button class="btn" id="rotl" style="font-size:.8rem;">↺</button>
    <button class="btn" id="rotr" style="font-size:.8rem;">↻</button>
    <div class="dv"></div>
    <button class="btn" id="fwd">front</button>
    <button class="btn" id="bck">back</button>
    <button class="btn" id="del">remove</button>
    <div id="tb1sp"></div>
    <button class="btn" id="mute">♪ sound</button>
  </div>
  <div id="tb2">
    <span class="rlbl">nasa</span>
    <div id="sprow"><button id="spshuf">✦ shuffle</button></div>
    <div class="rdv"></div>
    <span class="rlbl">background</span>
    <div class="bgsw act" data-type="solid" data-color="#faf8f5" title="cream" style="background:#faf8f5;border-color:#6a5040;outline:1px solid #c8c0b4;"></div>
    <div class="bgsw" data-type="solid" data-color="#f74ba1" title="hot pink" style="background:#f74ba1;"></div>
    <div class="bgsw" data-type="solid" data-color="#3234f1" title="cobalt" style="background:#3234f1;"></div>
    <div class="bgsw" data-type="solid" data-color="#d9c533" title="citrine" style="background:#d9c533;"></div>
    <div class="bgsw" data-type="solid" data-color="#5fa610" title="malachite" style="background:#5fa610;"></div>
    <div class="bgsw" data-type="solid" data-color="#bf1f1c" title="ruby" style="background:#bf1f1c;"></div>
    <div class="bgsw" data-type="solid" data-color="#1c1211" title="near black" style="background:#1c1211;"></div>
    <div class="bgdv"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#f74ba1" data-right="#3234f1" style="background:linear-gradient(to right,#f74ba1 50%,#3234f1 50%);"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#d9c533" data-right="#bf1f1c" style="background:linear-gradient(to right,#d9c533 50%,#bf1f1c 50%);"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#5fa610" data-right="#1c1211" style="background:linear-gradient(to right,#5fa610 50%,#1c1211 50%);"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#5f4096" data-right="#c8882a" style="background:linear-gradient(to right,#5f4096 50%,#c8882a 50%);"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#5bc8e8" data-right="#f74ba1" style="background:linear-gradient(to right,#5bc8e8 50%,#f74ba1 50%);"></div>
    <div class="bgsw bgsplit" data-type="split" data-left="#e75928" data-right="#3234f1" style="background:linear-gradient(to right,#e75928 50%,#3234f1 50%);"></div>
    <div class="bgdv"></div>
    <button id="photobtn">⊕ photo</button>
  </div>
  <div id="main">
    <div id="tray">
      <div id="trays">
        <div id="trayh"><span>shapes</span><button id="shuf">shuffle</button></div>
        <div id="tg"></div>
      </div>
    </div>
    <div id="cw">
      <div id="cv">
        <div id="cvbg"></div>
        <div class="hnd" id="sh"></div>
        <div class="hnd" id="rh"></div>
      </div>
    </div>
  </div>
  <div id="foot">
    <div id="fcredit">A sensorial art tool by <span>Bri Emery</span></div>
    <div id="facts">
      <button class="fbt" id="fclr">clear</button>
      <button class="fbt" id="fwall">✦ save to wall</button>
      <button class="fbt" id="fsave">save ↓</button>
    </div>
  </div>
</div>
<div id="wall">
  <div id="wallh"><span id="wallt">Community Wall</span><span id="walls">compositions from everyone</span></div>
  <div id="wg"><div class="we">loading...</div></div>
  <div id="wpager"><button class="pbt" id="wprev">← prev</button><span id="wpage"></span><button class="pbt" id="wnext">next →</button></div>
</div>
<div id="nm" style="display:none;"><div id="nmi">
  <div id="nmt">Sign your work</div>
  <div id="nms">Your name appears below your composition</div>
  <input type="text" id="nminput" placeholder="your name" maxlength="40">
  <div id="nmbtns"><button class="nmb" id="nmanon">leave anonymous</button><button class="nmb" id="nmsub">add to wall</button></div>
</div></div>
<div id="lb" style="display:none;"><div id="lbi">
  <button id="lbc">×</button>
  <img id="lbimg" src="" alt="">
  <div id="lbn"></div>
</div></div>
<div id="ty" style="display:none;">
  <div id="tybox">
    <div id="tybg"></div>
    <div id="tyglow"></div>
    <div id="tycontent">
      <div id="tytitle">Thank You for<br>Participating ♡<br>— Bri</div>
      <div id="tysub">Your art is on the wall.</div>
      <button id="tyclose">close</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<canvas id="hc" style="display:none;"></canvas>

async function loadWall(page){
  if(page===undefined)page=0;
  wallPage=page;
  const wg=document.getElementById('wg');
  wg.innerHTML='<div class="we">loading...</div>';
  try{
    const metaRes=await fetch(SURL+'/rest/v1/artwall_compositions?select=id,author_name,created_at&order=created_at.desc',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
    const metaData=await metaRes.json();
    if(!Array.isArray(metaData)||!metaData.length){wg.innerHTML='<div class="we">no compositions yet — be the first</div>';document.getElementById('wpager').style.display='none';return;}
    const totalPages=Math.ceil(metaData.length/WALL_PER_PAGE);
    const pageRows=metaData.slice(page*WALL_PER_PAGE,(page+1)*WALL_PER_PAGE);
    const prev=document.getElementById('wprev'),next=document.getElementById('wnext'),pg=document.getElementById('wpage');
    prev.style.display=page>0?'':'none';next.style.display=page<totalPages-1?'':'none';
    pg.textContent=totalPages>1?(page+1)+' / '+totalPages:'';
    document.getElementById('wpager').style.display=totalPages>1?'flex':'none';
    prev.onclick=()=>loadWall(page-1);next.onclick=()=>loadWall(page+1);
    wg.innerHTML='';
    const cardMap={};
    pageRows.forEach(row=>{
      const item=document.createElement('div');item.className='wi';
      const thumb=document.createElement('div');thumb.className='wt';
      thumb.innerHTML='<div class="wph">loading...</div>';
      const nameEl=document.createElement('div');nameEl.className='wn';nameEl.textContent=(row.author_name&&row.author_name!=='anonymous')?row.author_name:'';
      const delBtn=document.createElement('button');delBtn.className='wd';delBtn.textContent='remove';
      delBtn.addEventListener('click',async e=>{e.stopPropagation();const pw=prompt('Enter password to remove:');if(pw!==DPASS){toast('incorrect password');return;}try{const r=await fetch(SURL+'/rest/v1/artwall_compositions?id=eq.'+row.id,{method:'DELETE',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});if(r.ok||r.status===204){toast('removed');loadWall(page);}else toast('could not remove');}catch(ex){toast('error');}});
      item.appendChild(thumb);item.appendChild(nameEl);item.appendChild(delBtn);
      wg.appendChild(item);cardMap[row.id]=thumb;
    });
    for(const row of pageRows){
      try{
        const imgRes=await fetch(SURL+'/rest/v1/artwall_compositions?select=id,image_data&id=eq.'+row.id,{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
        const imgData=await imgRes.json();
        if(Array.isArray(imgData)&&imgData[0]&&imgData[0].image_data){
          const thumb=cardMap[row.id];
          if(thumb){const img=document.createElement('img');img.src=imgData[0].image_data;img.alt='';thumb.innerHTML='';thumb.appendChild(img);thumb.addEventListener('click',()=>openLb(imgData[0].image_data,row.author_name||''));}
        }
      }catch(err){}
    }
  }catch(e){wg.innerHTML='<div class="we">error: '+e.message+'</div>';}
}
