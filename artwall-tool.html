<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Wall</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-size:110%;font-family:"Courier New",monospace;background:#f0ebe2;}
#artwall-root #ab{width:100%;display:flex;flex-direction:column;background:#f0ebe2;overflow:hidden;}

/* ── ROW 1: editing tools ── */
#artwall-root #tb1{
  flex:0 0 44px;min-height:44px;max-height:44px;
  background:#faf8f5;border-bottom:1px solid #e8e0d8;
  display:flex;align-items:center;padding:0 14px;gap:0;overflow:hidden;
}
#artwall-root #abt{font-size:.72rem;font-weight:bold;letter-spacing:3px;text-transform:uppercase;color:#2a1a0a;white-space:nowrap;padding-right:12px;border-right:1px solid #e0d8cc;margin-right:10px;flex-shrink:0;}
#artwall-root .aw-dv{width:1px;height:20px;background:#e0d8cc;margin:0 6px;flex-shrink:0;}
#artwall-root .aw-btn{background:transparent;color:#2a1a0a;border:1px solid #c8c0b4;padding:3px 9px;cursor:pointer;font-size:.58rem;font-family:"Courier New",monospace;letter-spacing:.8px;text-transform:uppercase;user-select:none;touch-action:manipulation;transition:background .12s,color .12s,border-color .12s;white-space:nowrap;height:26px;display:inline-flex;align-items:center;}
#artwall-root .btn+.aw-btn{margin-left:3px;}
#artwall-root .aw-btn:hover{color:#faf8f5;border-color:transparent;}
#artwall-root #surprise{border-color:#c8d0a0;color:#2a3a10;font-style:italic;}
#artwall-root .aw-sr{display:flex;align-items:center;gap:4px;margin:0 6px;font-size:.5rem;letter-spacing:.5px;text-transform:uppercase;color:#4a3828;white-space:nowrap;}
#artwall-root #ss{width:52px;accent-color:#c8a060;touch-action:none;}
#artwall-root #sv{min-width:28px;font-size:.58rem;color:#2a1a0a;font-weight:bold;}
#artwall-root #tb1-spacer{flex:1;}

/* ── ROW 2: backgrounds ── */
#artwall-root #tb2{
  flex:0 0 36px;min-height:36px;max-height:36px;
  background:#faf8f5;border-bottom:1.5px solid #c8c0b4;
  display:flex;align-items:center;justify-content:flex-end;padding:0 14px;gap:6px;overflow:hidden;
}
#artwall-root .aw-row-label{font-size:.38rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;white-space:nowrap;flex-shrink:0;}
#artwall-root .aw-row-dv{width:1px;height:14px;background:#e0d8cc;margin:0 4px;flex-shrink:0;}
#artwall-root #sprow{display:flex;align-items:center;gap:3px;flex-shrink:0;}
#artwall-root .aw-sp-sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .12s;background-size:cover;background-position:center;}
#artwall-root .aw-sp-sw:hover{transform:scale(1.22);}
#artwall-root .aw-sp-sw.aw-bga{border-color:#2a1a0a;transform:scale(1.15);}
#artwall-root #spshuf{height:18px;border-radius:9px;border:1px solid #6a5040;cursor:pointer;background:#f5f0e8;font-size:.34rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;font-weight:bold;padding:0 6px;transition:all .12s;white-space:nowrap;flex-shrink:0;}
#artwall-root #spshuf:hover{background:#3234f1;color:#faf8f5;border-color:#3234f1;}
#artwall-root .aw-bgs{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .12s,border-color .12s;}
#artwall-root .aw-bgsplit{overflow:hidden;}
#artwall-root .aw-bgs:hover{transform:scale(1.22);}
#artwall-root .aw-bgs.aw-bga{border-color:#2a1a0a;transform:scale(1.15);}
#artwall-root .aw-bgdv{width:1px;height:12px;background:#e0d8cc;margin:0 3px;flex-shrink:0;}
#artwall-root #photobtn{height:18px;border-radius:9px;border:1.5px solid #6a5040;cursor:pointer;background:#f5f0e8;font-size:.34rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;font-weight:bold;padding:0 6px;white-space:nowrap;transition:all .12s;flex-shrink:0;}
#artwall-root #photobtn:hover{background:#c8882a;color:#faf8f5;border-color:#c8882a;}
#artwall-root #photobtn.aw-bga{border-color:#2a1a0a;background:#e8e0d4;}
#artwall-root #tb2-spacer{flex:1;}

/* ── MAIN ── */
#artwall-root #main{display:flex;overflow:hidden;width:100%;}
#artwall-root #tray{width:162px;flex-shrink:0;background:#ede8e0;border-right:1.5px solid #c8c0b4;display:flex;flex-direction:column;overflow:hidden;}
#artwall-root #trays{flex:1;overflow-y:scroll;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:5px;}
#artwall-root #trays::-webkit-scrollbar{width:3px;}
#artwall-root #trays::-webkit-scrollbar-thumb{background:#c8c0b4;}
#artwall-root #trayh{font-size:.4rem;letter-spacing:2px;text-transform:uppercase;color:#6a5840;font-weight:bold;padding:0 2px 4px;border-bottom:1px solid #d8d0c4;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
#artwall-root #shuf{background:none;border:1px solid #c8c0b4;font-size:.4rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#6a5840;padding:2px 4px;cursor:pointer;}
#artwall-root #shuf:hover{background:#f74ba1;color:#fff;border-color:#f74ba1;}
#artwall-root #tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
#artwall-root .aw-ti{cursor:pointer;border:1px solid transparent;padding:2px;background:#faf8f5;display:flex;align-items:center;justify-content:center;min-height:54px;user-select:none;touch-action:manipulation;}
#artwall-root .ti:hover{border-color:#d4a870;background:#fdf8f0;}
#artwall-root .aw-ti img{max-width:100%;max-height:58px;display:block;pointer-events:none;}
#artwall-root #cw{flex:1;min-width:0;background:#f0ebe2;display:flex;align-items:center;justify-content:center;touch-action:none;padding:8px;overflow:hidden;}
#artwall-root #cv{position:relative;background:#faf8f5;border:1px solid #c8c0b4;box-shadow:2px 2px 0 #d4cbbf;overflow:hidden;touch-action:none;isolation:isolate;}
#artwall-root #cvbg{position:absolute;inset:0;pointer-events:none;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;}
#artwall-root .aw-sp{position:absolute;cursor:grab;user-select:none;touch-action:none;transform-origin:center center;z-index:1;}
#artwall-root .aw-sp:active{cursor:grabbing;}
#artwall-root .aw-sp.aw-sel{outline:1px dashed #d4a870;outline-offset:3px;}
#artwall-root .aw-sp img{display:block;width:100%;height:100%;pointer-events:none;}
#artwall-root .aw-ghost{position:fixed;pointer-events:none;z-index:999999;opacity:.72;top:0;left:0;}
#artwall-root .aw-hnd{position:absolute;width:11px;height:11px;border:1.5px solid #c8a060;background:#fdf8f0;z-index:9999;display:none;touch-action:none;}
#artwall-root #sh{cursor:se-resize;bottom:-5px;right:-5px;}
#artwall-root #rh{cursor:crosshair;top:-18px;left:50%;margin-left:-5px;border-radius:50%;background:#e8c070;border-color:#c8a050;}

/* ── FOOTER ── */
#artwall-root #foot{flex:0 0 36px;min-height:36px;max-height:36px;background:#faf8f5;border-top:1px solid #e0d8cc;display:flex;align-items:center;justify-content:space-between;padding:0 14px;overflow:hidden;}
#artwall-root #fcredit{font-size:.5rem;letter-spacing:1.5px;text-transform:uppercase;color:#8a7868;font-style:italic;}
#artwall-root #fcredit span{color:#4a3020;font-weight:bold;font-style:normal;}
#artwall-root #facts{display:flex;align-items:center;gap:5px;}
#artwall-root .aw-fbt{background:transparent;color:#2a1a0a;border:1px solid #c8c0b4;padding:3px 10px;cursor:pointer;font-size:.58rem;font-family:"Courier New",monospace;letter-spacing:.8px;text-transform:uppercase;transition:all .12s;white-space:nowrap;height:24px;display:inline-flex;align-items:center;}
#artwall-root .aw-fbt:hover{background:#2a1a0a;color:#faf8f5;border-color:#2a1a0a;}
#artwall-root #fclr:hover{background:#bf1f1c!important;color:#faf8f5!important;border-color:#bf1f1c!important;}
#artwall-root #fwall:hover{background:#5f4096!important;color:#faf8f5!important;border-color:#5f4096!important;}
#artwall-root #fsave:hover{background:#c8882a!important;color:#faf8f5!important;border-color:#c8882a!important;}

/* ── TOAST (simple) ── */
#artwall-root #toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);background:#2a1a0a;color:#faf8f5;padding:8px 20px;font-size:.5rem;letter-spacing:2px;text-transform:uppercase;font-family:"Courier New",monospace;opacity:0;transition:opacity .4s;pointer-events:none;z-index:99999;white-space:nowrap;}
#artwall-root #toast.show{opacity:1;}

/* ── THANK YOU MODAL ── */
#artwall-root #ty-modal{
  display:none;position:fixed;inset:0;z-index:99990;
  align-items:center;justify-content:center;
  background:rgba(10,6,20,.82);
}
#artwall-root #ty-modal.open{display:flex;}
#artwall-root #ty-box{
  position:relative;
  width:min(540px,88vw);
  padding:0;overflow:hidden;
  border-radius:2px;
  box-shadow:0 0 0 1px rgba(255,255,255,.12),0 0 60px 20px rgba(255,220,40,.18),0 0 120px 40px rgba(255,220,40,.08);
}
#artwall-root #ty-photo{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:brightness(.72) saturate(1.2);
  z-index:0;
}
#artwall-root #ty-glow{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse 70% 55% at 50% 52%, rgba(255,220,30,.38) 0%, transparent 72%);
  pointer-events:none;
}
#artwall-root #ty-content{
  position:relative;z-index:2;
  padding:52px 36px 44px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
#artwall-root #ty-title{
  font-size:clamp(1.3rem,5vw,2.1rem);
  font-family:"Courier New",monospace;
  font-weight:bold;
  letter-spacing:3px;
  text-transform:uppercase;
  line-height:1.25;
  /* glitter shimmer via animated gradient */
  background:linear-gradient(90deg,#fff 0%,#ffe566 20%,#fff 35%,#ffe566 55%,#fff 70%,#ffe566 85%,#fff 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:glitter 2.4s linear infinite;
  text-shadow:none;
  filter:drop-shadow(0 0 8px rgba(255,220,40,.7)) drop-shadow(0 0 24px rgba(255,200,20,.4));
}
@keyframes glitter{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}
#artwall-root #ty-sub{
  font-size:.6rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.72);
  font-family:"Courier New",monospace;
}
/* sparkle particles */
#artwall-root .spark{
  position:absolute;pointer-events:none;
  width:4px;height:4px;border-radius:50%;
  background:#ffe566;
  animation:sparkle var(--d,1.2s) ease-out var(--delay,0s) infinite;
  opacity:0;
}
@keyframes sparkle{
  0%{opacity:0;transform:translate(0,0) scale(0);}
  20%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1);}
  80%{opacity:.6;transform:translate(calc(var(--tx)*1.6),calc(var(--ty)*1.6)) scale(.5);}
  100%{opacity:0;transform:translate(calc(var(--tx)*2.2),calc(var(--ty)*2.2)) scale(0);}
}
#artwall-root #ty-close{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.3);
  color:#faf8f5;padding:8px 28px;
  cursor:pointer;font-size:.52rem;
  font-family:"Courier New",monospace;letter-spacing:2px;text-transform:uppercase;
  transition:background .15s,border-color .15s;
}
#artwall-root #ty-close:hover{background:rgba(255,220,40,.22);border-color:rgba(255,220,40,.6);}

/* ── NAME MODAL ── */
#artwall-root #nm{display:none;position:fixed;inset:0;background:rgba(42,26,10,.5);z-index:88888;align-items:center;justify-content:center;}
#artwall-root #nm.open{display:flex;}
#artwall-root #nmi{background:#faf8f5;border:1px solid #c8c0b4;padding:26px 22px;max-width:360px;width:90%;box-shadow:4px 4px 0 #d4cbbf;}
#artwall-root #nmt{font-size:.72rem;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#2a1a0a;margin-bottom:5px;}
#artwall-root #nms{font-size:.47rem;letter-spacing:1px;text-transform:uppercase;color:#9a8878;margin-bottom:14px;}
#artwall-root #nminput{width:100%;border:1px solid #c8c0b4;background:#faf8f5;font-family:"Courier New",monospace;font-size:.72rem;color:#2a1a0a;padding:7px 9px;outline:none;margin-bottom:12px;}
#artwall-root #nminput:focus{border-color:#c8a882;}
#artwall-root #nmbtns{display:flex;gap:7px;}
#artwall-root .aw-nmb{flex:1;background:transparent;border:1px solid #c8c0b4;padding:7px;cursor:pointer;font-size:.47rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;color:#2a1a0a;transition:all .12s;}
#artwall-root .aw-nmb:hover{background:#2a1a0a;color:#faf8f5;}
#artwall-root #nmanon{border-color:#c8d0a0;color:#2a3a10;}
#artwall-root #nmanon:hover{background:#5fa610;color:#faf8f5;border-color:#5fa610;}
#artwall-root #nmsub{border-color:#c8b0e0;color:#3a1060;}
#artwall-root #nmsub:hover{background:#5f4096;color:#faf8f5;border-color:#5f4096;}

/* ── LIGHTBOX ── */
#artwall-root #lb{display:none;position:fixed;inset:0;background:rgba(42,26,10,.82);z-index:99990;align-items:center;justify-content:center;cursor:pointer;}
#artwall-root #lb.open{display:flex;}
#artwall-root #lbi{position:relative;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:8px;}
#artwall-root #lbi img{max-width:90vw;max-height:78vh;object-fit:contain;display:block;}
#artwall-root #lbn{font-size:.47rem;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,245,.7);}
#artwall-root #lbc{position:absolute;top:-13px;right:-13px;background:#2a1a0a;color:#faf8f5;border:none;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}

/* ── WALL ── */
#artwall-root #wall{background:#faf8f5;border-top:1.5px solid #c8c0b4;padding:14px 14px 18px;}
#artwall-root #wpager{display:flex;align-items:center;gap:12px;margin-top:14px;justify-content:center;}
#artwall-root .aw-pbt{background:transparent;border:1px solid #c8c0b4;color:#2a1a0a;padding:4px 14px;cursor:pointer;font-size:.47rem;font-family:"Courier New",monospace;letter-spacing:1px;text-transform:uppercase;transition:all .12s;}
#artwall-root .aw-pbt:hover{background:#2a1a0a;color:#faf8f5;}
#artwall-root #wpage{font-size:.4rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;}
#artwall-root #wallh{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
#artwall-root #wallt{font-size:.52rem;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#2a1a0a;}
#artwall-root #walls{font-size:.47rem;letter-spacing:1px;text-transform:uppercase;color:#9a8878;}
#artwall-root #wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
#artwall-root .aw-wi{display:flex;flex-direction:column;gap:3px;}
#artwall-root .aw-wt{aspect-ratio:4/3;background:#f0ebe2;border:1px solid #e0d8cc;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;}
#artwall-root .aw-wt:hover{border-color:#c8a882;transform:scale(1.02);}
#artwall-root .aw-wt img{width:100%;height:100%;object-fit:cover;display:block;}
#artwall-root .aw-wn{font-size:.4rem;letter-spacing:1px;text-transform:uppercase;color:#8a7868;text-align:center;}
#artwall-root .aw-wd{background:none;border:none;font-size:.35rem;letter-spacing:1px;text-transform:uppercase;color:#c8c0b4;cursor:pointer;font-family:"Courier New",monospace;padding:0;display:block;width:100%;text-align:center;}
#artwall-root .aw-wd:hover{color:#bf1f1c;}
#artwall-root .aw-we{font-size:.47rem;letter-spacing:2px;text-transform:uppercase;color:#9a8878;padding:20px 0;white-space:nowrap;}

@keyframes si{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
#artwall-root .aw-ent{animation:si .2s ease-out forwards;}

/* ── MOBILE OPTIMIZATIONS ── */
@media (max-width: 768px) {

  /* ── TB1: single tight row, no wrap ── */
#artwall-root #tb1{
    height: 40px;
    min-height: 40px;
    max-height: 40px;
    flex-wrap: nowrap;
    padding: 0 8px;
    gap: 0;
    overflow: hidden;
  }
#artwall-root #abt{ font-size: .6rem; letter-spacing: 2px; padding-right: 8px; margin-right: 6px; }
#artwall-root .aw-btn{ padding: 3px 6px; font-size: .5rem; height: 24px; letter-spacing: .5px; }
#artwall-root .btn + .aw-btn{ margin-left: 2px; }
#artwall-root .aw-dv{ margin: 0 4px; height: 16px; }
#artwall-root .aw-sr{ margin: 0 4px; gap: 3px; font-size: .44rem; }
#artwall-root #ss{ width: 36px; }
#artwall-root #sv{ font-size: .5rem; min-width: 22px; }
#artwall-root #mute{ display: none; }
#artwall-root #tb1-spacer{ min-width: 4px; }

  /* ── TB2: horizontal scroll, single row, no wrap ── */
#artwall-root #tb2{
    height: 38px;
    min-height: 38px;
    max-height: 38px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 8px;
    gap: 4px;
    justify-content: flex-start;
    flex-wrap: nowrap;
    scrollbar-width: none;
  }
#artwall-root #tb2::-webkit-scrollbar{ display: none; }
#artwall-root .aw-row-label{ font-size: .36rem; letter-spacing: 1.5px; flex-shrink: 0; }
#artwall-root .aw-row-dv{ margin: 0 3px; flex-shrink: 0; }
#artwall-root .aw-bgs{ width: 22px; height: 22px; flex-shrink: 0; }
#artwall-root .aw-bgdv{ margin: 0 2px; flex-shrink: 0; }
#artwall-root .aw-sp-sw{ width: 22px; height: 22px; flex-shrink: 0; }
#artwall-root #spshuf{ font-size: .32rem; padding: 0 5px; flex-shrink: 0; }
#artwall-root #photobtn{ font-size: .32rem; padding: 0 5px; flex-shrink: 0; }

  /* ── MAIN: tray on top as horizontal strip ── */
#artwall-root #main{ flex-direction: column; }

#artwall-root #tray{
    width: 100% !important;
    height: 80px !important;
    border-right: none;
    border-bottom: 1.5px solid #c8c0b4;
    flex-direction: row;
    flex-shrink: 0;
  }
#artwall-root #trays{
    overflow-x: auto;
    overflow-y: hidden;
    touch-action: pan-x;
    padding: 4px 6px;
    flex: 1;
    scrollbar-width: none;
  }
#artwall-root #trays::-webkit-scrollbar{ display: none; }
#artwall-root #trayh{ display: none; }
#artwall-root #tg{
    display: flex;
    flex-direction: row;
    gap: 3px;
    grid-template-columns: none;
    flex-wrap: nowrap;
  }
#artwall-root .aw-ti{
    min-width: 64px;
    min-height: 64px;
    max-height: 64px;
    flex-shrink: 0;
    padding: 2px;
  }
#artwall-root .aw-ti img{ max-height: 58px; max-width: 58px; }

  /* ── CANVAS ── */
#artwall-root #cw{ padding: 5px; flex: 1; min-height: 0; }

  /* ── FOOTER ── */
#artwall-root #foot{
    min-height: 40px;
    max-height: 40px;
    padding: 0 10px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
#artwall-root #fcredit{ font-size: .38rem; letter-spacing: 1px; white-space: nowrap; }
#artwall-root #facts{ gap: 4px; flex-shrink: 0; }
#artwall-root .aw-fbt{ padding: 3px 8px; font-size: .48rem; height: 24px; letter-spacing: .5px; }

  /* ── WALL ── */
#artwall-root #wg{ grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 5px; }
#artwall-root .aw-wn{ font-size: .36rem; }

  /* ── MODALS ── */
#artwall-root #nmi{ padding: 18px 14px; max-width: 94vw; }
#artwall-root #ty-box{ width: 94vw; }
#artwall-root #ty-content{ padding: 32px 18px 28px; }
#artwall-root #ty-title{ font-size: clamp(.9rem, 6vw, 1.5rem); }
#artwall-root #lbi img{ max-width: 96vw; max-height: 72vh; }
}

@media (max-width: 390px) {
  #artwall-root .aw-btn{ padding: 2px 5px; font-size: .44rem; height: 22px; }
#artwall-root #abt{ font-size: .52rem; }
#artwall-root .aw-fbt{ padding: 2px 6px; font-size: .42rem; }
#artwall-root #fcredit{ display: none; }
}
</style>
</head>
<body>
<input type="file" id="pbgi" accept="image/*" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;">

<div id="artwall-root"><div id="ab">

  <!-- ROW 1: editing tools -->
  <div id="tb1">
    <span id="abt">Art Wall</span>
    <button class="aw-btn" id="surprise">✦ surprise me</button>
    <div class="aw-dv"></div>
    <div class="aw-sr"><span>size</span><input type="range" id="ss" min="20" max="200" value="100"><span id="sv">100%</span></div>
    <div class="aw-dv"></div>
    <button class="aw-btn" id="rotl" title="rotate left" style="font-size:.8rem;">↺</button>
    <button class="aw-btn" id="rotr" title="rotate right" style="font-size:.8rem;">↻</button>
    <div class="aw-dv"></div>
    <button class="aw-btn" id="fwd">front</button>
    <button class="aw-btn" id="bck">back</button>
    <button class="aw-btn" id="del">remove</button>
    <div id="tb1-spacer"></div>
    <button class="aw-btn" id="mute">♪ sound</button>
  </div>

  <!-- ROW 2: backgrounds -->
  <div id="tb2">
    <!-- NASA photos -->
    <span class="aw-row-label">nasa</span>
    <div id="sprow">
      <button id="spshuf">✦ shuffle</button>
    </div>
    <div class="aw-row-dv"></div>
    <!-- Color backgrounds -->
    <span class="aw-row-label">background</span>
    <div class="aw-bgs aw-bga" data-type="solid" data-color="#faf8f5" title="cream" style="background:#faf8f5;border-color:#2a1a0a;"></div><div class="aw-bgs" data-type="solid" data-color="#f74ba1" title="hot pink" style="background:#f74ba1;"></div><div class="aw-bgs" data-type="solid" data-color="#3234f1" title="cobalt" style="background:#3234f1;"></div><div class="aw-bgs" data-type="solid" data-color="#d9c533" title="citrine" style="background:#d9c533;"></div><div class="aw-bgs" data-type="solid" data-color="#5fa610" title="malachite" style="background:#5fa610;"></div><div class="aw-bgs" data-type="solid" data-color="#bf1f1c" title="ruby" style="background:#bf1f1c;"></div><div class="aw-bgs" data-type="solid" data-color="#1c1211" title="near black" style="background:#1c1211;"></div>
    <div class="aw-bgdv"></div>
    <div class="aw-bgs aw-bgsplit" data-type="split" data-left="#f74ba1" data-right="#3234f1" style="background:linear-gradient(to right,#f74ba1 50%,#3234f1 50%);"></div><div class="aw-bgs aw-bgsplit" data-type="split" data-left="#d9c533" data-right="#bf1f1c" style="background:linear-gradient(to right,#d9c533 50%,#bf1f1c 50%);"></div><div class="aw-bgs aw-bgsplit" data-type="split" data-left="#5fa610" data-right="#1c1211" style="background:linear-gradient(to right,#5fa610 50%,#1c1211 50%);"></div><div class="aw-bgs aw-bgsplit" data-type="split" data-left="#5f4096" data-right="#c8882a" style="background:linear-gradient(to right,#5f4096 50%,#c8882a 50%);"></div><div class="aw-bgs aw-bgsplit" data-type="split" data-left="#5bc8e8" data-right="#f74ba1" style="background:linear-gradient(to right,#5bc8e8 50%,#f74ba1 50%);"></div><div class="aw-bgs aw-bgsplit" data-type="split" data-left="#e75928" data-right="#3234f1" style="background:linear-gradient(to right,#e75928 50%,#3234f1 50%);"></div>
    <div class="aw-bgdv"></div>
    <button id="photobtn">⊕ photo</button>
    
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="tray">
      <div id="trays">
        <div id="trayh"><span>shapes</span><button id="shuf">shuffle</button></div>
        <div id="tg"></div>
      </div>
    </div>
    <div id="cw">
      <div id="cv" style="touch-action:none;">
        <div id="cvbg"></div>
        <div class="aw-hnd" id="sh"></div>
        <div class="aw-hnd" id="rh"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="foot">
    <div id="fcredit">A sensorial art tool by <span>Bri Emery</span></div>
    <div id="facts">
      <button class="aw-fbt" id="fclr">clear</button>
      <button class="aw-fbt" id="fwall">✦ save to wall</button>
      <button class="aw-fbt" id="fsave">save ↓</button>
    </div>
  </div>
</div>

<!-- COMMUNITY WALL -->
<div id="wall">
  <div id="wallh">
    <span id="wallt">Community Wall</span>
    <span id="walls">compositions from everyone</span>
  </div>
  <div id="wg"></div>
  <div id="wpager">
    <button class="aw-pbt" id="wprev" style="display:none">← prev</button>
    <span id="wpage"></span>
    <button class="aw-pbt" id="wnext" style="display:none">next →</button>
  </div>
</div>
</div><!-- /artwall-root -->

<!-- THANK YOU MODAL -->
<div id="ty-modal">
  <div id="ty-box">
    <div id="ty-photo"></div>
    <div id="ty-glow"></div>
    <div id="ty-content">
      <div id="ty-title">Thank You for<br>Participating ♡<br>— Bri</div>
      <div id="ty-sub">Your art is on the wall.</div>
      <button id="ty-close">close</button>
    </div>
  </div>
</div>

<!-- NAME MODAL -->
<div id="nm"><div id="nmi">
  <div id="nmt">Sign your work</div>
  <div id="nms">Your name appears below your composition</div>
  <input type="text" id="nminput" placeholder="your name" maxlength="40">
  <div id="nmbtns">
    <button class="aw-nmb" id="nmanon">leave anonymous</button>
    <button class="aw-nmb" id="nmsub">add to wall</button>
  </div>
</div></div>

<!-- LIGHTBOX -->
<div id="lb"><div id="lbi">
  <button id="lbc">×</button>
  <img id="lbimg" src="" alt="">
  <div id="lbn"></div>
</div></div>

<div id="toast"></div>
<canvas id="hc" style="display:none"></canvas>

const S={

function rndPos(){const CW=cv.clientWidth,CH=cv.clientHeight,m=60;return{x:m+Math.random()*(CW-m*2),y:m+Math.random()*(CH-m*2)};}
function buildTray(list){
  tg.innerHTML='';
  list.forEach((s,i)=>{
    const d=document.createElement('div');d.className='aw-ti';
    const img=document.createElement('img');img.src=s.src;img.draggable=false;d.appendChild(img);
    d.addEventListener('click',e=>{e.stopPropagation();S.ac();const p=rndPos();addSh(i,p.x,p.y,list);});
    d.addEventListener('pointerdown',e=>{
      if(e.button!==0&&e.pointerType==='mouse')return;e.stopPropagation();S.ac();
      let drag=false;const sx=e.clientX,sy=e.clientY;
      function mv(ev){const dx=ev.clientX-sx,dy=ev.clientY-sy;if(!drag&&Math.sqrt(dx*dx+dy*dy)<5)return;if(!drag){drag=true;mkGhost(s,ev.clientX,ev.clientY);S.whoosh();}mvGhost(ev.clientX,ev.clientY);}
      function up(ev){window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);if(!drag)return;rmGhost();const cr=cv.getBoundingClientRect();if(ev.clientX>=cr.left&&ev.clientX<=cr.right&&ev.clientY>=cr.top&&ev.clientY<=cr.bottom){addSh(i,ev.clientX-cr.left,ev.clientY-cr.top,list);S.tap();}}
      window.addEventListener('pointermove',mv,{passive:false});window.addEventListener('pointerup',up);
    });
    tg.appendChild(d);
  });
}

function mkGhost(s,x,y){rmGhost();const sc=Math.min(1,160/s.w,160/s.h),w=Math.round(s.w*sc),h=Math.round(s.h*sc);ghost=document.createElement('img');ghost.className='aw-ghost';ghost.src=s.src;ghost.style.cssText=`width:${w}px;height:${h}px;transform:translate(${x-w/2}px,${y-h/2}px)`;document.body.appendChild(ghost);}

function addSh(idx,cx,cy,list,opts){

  if(opts.rot)el.style.transform=`rotate(${opts.rot}deg)`;
  if(!opts.silent)el.classList.add('aw-ent');
  const img=document.createElement('img');img.src=s.src;img.draggable=false;el.appendChild(img);
  el._d={idx,list,w,h,bw:w,bh:h,nW:s.w,nH:s.h,rot:opts.rot||0,scale:1};

    const cr=cv.getBoundingClientRect(),ox=e.clientX-cr.left-parseInt(el.style.left),oy=e.clientY-cr.top-parseInt(el.style.top);
    function onM(ev){ev.preventDefault();const cr2=cv.getBoundingClientRect();el.style.left=Math.round(ev.clientX-cr2.left-ox)+'px';el.style.top=Math.round(ev.clientY-cr2.top-oy)+'px';const n=Date.now();if(n-mt>200){mt=n;S.tick();}}
    function onU(){el.releasePointerCapture(e.pointerId);el.removeEventListener('pointermove',onM);el.removeEventListener('pointerup',onU);el.removeEventListener('pointercancel',onU);}
    el.addEventListener('pointermove',onM,{passive:false});el.addEventListener('pointerup',onU);el.addEventListener('pointercancel',onU);
  });
}
function selEl(el){
  if(sel)sel.classList.remove('aw-sel');sel=el;
  if(!el){sh.style.display='none';rh.style.display='none';return;}
  el.classList.add('aw-sel');el.style.zIndex=++zC;el.appendChild(sh);el.appendChild(rh);
  sh.style.display='block';rh.style.display='block';
  if(el._d){ss.value=Math.round(el._d.scale*100);sv.textContent=Math.round(el._d.scale*100)+'%';}
}
cv.addEventListener('pointerdown',e=>{if(e.target===cv||e.target===cvbg)selEl(null);});
sh.addEventListener('pointerdown',e=>{
  e.stopPropagation();e.preventDefault();if(!sel)return;
  sh.setPointerCapture(e.pointerId);const el=sel,sx=e.clientX,sy=e.clientY,sw2=parseFloat(el.style.width);
  function onM(ev){ev.preventDefault();const d=(ev.clientX-sx+ev.clientY-sy)/2;if(el._d){const nw=Math.max(20,Math.min(sw2+d,el._d.nW)),sc=nw/el._d.bw;el._d.scale=sc;el.style.width=Math.round(el._d.bw*sc)+'px';el.style.height=Math.round(el._d.bh*sc)+'px';ss.value=Math.round(sc*100);sv.textContent=Math.round(sc*100)+'%';}}
  function onU(){sh.releasePointerCapture(e.pointerId);sh.removeEventListener('pointermove',onM);sh.removeEventListener('pointerup',onU);}
  sh.addEventListener('pointermove',onM,{passive:false});sh.addEventListener('pointerup',onU);
});
rh.addEventListener('pointerdown',e=>{
  e.stopPropagation();e.preventDefault();if(!sel)return;
  rh.setPointerCapture(e.pointerId);const el=sel,r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,sa=Math.atan2(e.clientY-cy,e.clientX-cx),sr=el._d?el._d.rot:0;
  function onM(ev){ev.preventDefault();const a=Math.atan2(ev.clientY-cy,ev.clientX-cx),rot=sr+(a-sa)*180/Math.PI;if(el._d)el._d.rot=rot;el.style.transform=`rotate(${rot}deg)`;}
  function onU(){rh.releasePointerCapture(e.pointerId);rh.removeEventListener('pointermove',onM);rh.removeEventListener('pointerup',onU);}
  rh.addEventListener('pointermove',onM,{passive:false});rh.addEventListener('pointerup',onU);
});
ss.addEventListener('input',()=>{if(!sel||!sel._d)return;const sc=parseInt(ss.value)/100,mx=sel._d.nW/sel._d.bw,cl=Math.min(sc,mx);sel._d.scale=cl;sel.style.width=Math.round(sel._d.bw*cl)+'px';sel.style.height=Math.round(sel._d.bh*cl)+'px';sv.textContent=Math.round(cl*100)+'%';ss.value=Math.round(cl*100);});

document.getElementById('rotl').addEventListener('click',()=>{if(!sel)return;const r=(sel._d?sel._d.rot:0)-15;if(sel._d)sel._d.rot=r;sel.style.transform=`rotate(${r}deg)`;S.ting();});
document.getElementById('rotr').addEventListener('click',()=>{if(!sel)return;const r=(sel._d?sel._d.rot:0)+15;if(sel._d)sel._d.rot=r;sel.style.transform=`rotate(${r}deg)`;S.ting();});
document.getElementById('fwd').addEventListener('click',()=>{if(sel)sel.style.zIndex=++zC;});
document.getElementById('bck').addEventListener('click',()=>{if(!sel)return;const z=parseInt(sel.style.zIndex);if(z>11)sel.style.zIndex=z-2;});
document.getElementById('del').addEventListener('click',()=>{if(!sel)return;S.ting();cv.removeChild(sel);shapes=shapes.filter(s=>s!==sel);sel=null;sh.style.display='none';rh.style.display='none';});
document.getElementById('mute').addEventListener('click',()=>{S.on=!S.on;const b=document.getElementById('mute');b.textContent=S.on?'♪ sound':'— muted';b.style.color=S.on?'':'#bf1f1c';});
document.getElementById('surprise').addEventListener('click',()=>{
  S.ac();const CW=cv.clientWidth,CH=cv.clientHeight,n=8+Math.floor(Math.random()*7),used=new Set();
  for(let i=0;i<n;i++){let idx,t=0;do{idx=Math.floor(Math.random()*SHAPES.length);t++;}while(used.has(idx)&&t<50);used.add(idx);const cx=60+Math.random()*(CW-120),cy=60+Math.random()*(CH-120),rot=(Math.random()-.5)*50,b=.5+Math.random()*.7,s=SHAPES[idx],sc=Math.min(1,(160*b)/s.w,(160*b)/s.h);addSh(idx,cx,cy,SHAPES,{w:Math.round(s.w*sc),h:Math.round(s.h*sc),rot,silent:true});}S.arp();
});
document.getElementById('fclr').addEventListener('click',()=>{shapes.forEach(s=>{try{cv.removeChild(s);}catch(e){}}); shapes=[];sel=null;sh.style.display='none';rh.style.display='none';S.shimmer(.04);});

// ── THANK YOU MODAL ───────────────────────────────────
function showThankyou(){
  // Pick a fresh random NASA photo
  const url=SPACE_IMGS[Math.floor(Math.random()*SPACE_IMGS.length)];
  document.getElementById('ty-photo').style.backgroundImage=`url('${SPACE_BASE+url}')`;
  // Sprinkle sparks
  const box=document.getElementById('ty-box');
  box.querySelectorAll('.spark').forEach(s=>s.remove());
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');sp.className='spark';
    const tx=(Math.random()-0.5)*260,ty=(Math.random()-0.5)*180;
    sp.style.cssText=`--tx:${tx}px;--ty:${ty}px;--d:${0.9+Math.random()*1.4}s;--delay:${Math.random()*1.6}s;left:${40+Math.random()*60}%;top:${30+Math.random()*40}%;background:${Math.random()>.5?'#ffe566':'#fff'}`;
    box.appendChild(sp);

const SPACE_BASE='https://raw.githubusercontent.com/brieannepaige/vintage-backgrounds/main/';
document.getElementById('ty-close').addEventListener('click',()=>{document.getElementById('ty-modal').classList.remove('open');});
document.getElementById('ty-modal').addEventListener('click',e=>{if(e.target===document.getElementById('ty-modal'))document.getElementById('ty-modal').classList.remove('open');});

// Capture
async function capture(){
  return new Promise(resolve=>{
    const go=async()=>{
      const prev=sel;if(sel){sel.classList.remove('aw-sel');sh.style.display='none';rh.style.display='none';}
      const bgc=aSplit?aSplit.l:(aPhoto?null:aBg);
      const res=await html2canvas(cv,{backgroundColor:bgc||'#faf8f5',scale:2,useCORS:true,allowTaint:true,logging:false});
      if(prev){prev.classList.add('sel');prev.appendChild(sh);prev.appendChild(rh);sh.style.display='block';rh.style.display='block';}
      resolve(res.toDataURL('image/png'));
    };
    if(window.html2canvas){go();return;}
    const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';sc.onload=go;document.head.appendChild(sc);
  });
}
document.getElementById('fsave').addEventListener('click',async()=>{toast('saving...');const d=await capture();const a=document.createElement('a');a.download='artwall.png';a.href=d;a.click();toast('saved ↓');S.bell(880,.06,.8);});

const nm=document.getElementById('nm'),nminput=document.getElementById('nminput');
document.getElementById('fwall').addEventListener('click',async()=>{toast('preparing...');S.ac();pendUrl=await capture();nminput.value='';nm.classList.add('open');setTimeout(()=>nminput.focus(),100);});
async function saveWall(name){
  nm.classList.remove('open');toast('saving to wall...');
  try{
    const res=await fetch(SURL+'/rest/v1/artwall_compositions',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({image_data:pendUrl,bg_color:aBg,author_name:name||'anonymous',created_at:new Date().toISOString()})});
    if(res.ok||res.status===201){
      showThankyou();
      Promise.resolve(loadWall(0)).then(()=>{
        setTimeout(()=>{
          document.getElementById('wall').scrollIntoView({behavior:'smooth',block:'start'});
        }, 600);
      });
    } else toast('could not save');
  }catch(e){toast('error saving');}
  pendUrl=null;
}
document.getElementById('nmanon').addEventListener('click',()=>saveWall('anonymous'));
document.getElementById('nmsub').addEventListener('click',()=>saveWall(nminput.value.trim()||'anonymous'));
nminput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveWall(nminput.value.trim()||'anonymous');}});
nm.addEventListener('click',e=>{if(e.target===nm)nm.classList.remove('open');});

const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbn=document.getElementById('lbn');
function openLb(src,name){lbimg.src=src;lbn.textContent=name&&name!=='anonymous'?'by '+name:'';lb.classList.add('open');}
lb.addEventListener('click',e=>{if(e.target===lb||e.target===lbimg)lb.classList.remove('open');});
document.getElementById('lbc').addEventListener('click',()=>lb.classList.remove('open'));

// Wall pagination state
let wallPage = 0;
const WALL_PER_PAGE = 40;
let wallTotal = 0;
let wallIds = []; // fetch IDs first (tiny), then images one by one

async function loadWall(page){
  if(page===undefined) page=0;
  wallPage=page;
  const wg=document.getElementById('wg');
  wg.innerHTML='<div class="aw-we">loading...</div>';

  try{
    // Step 1: fetch ONLY ids and metadata (no image_data) — tiny payload
    const metaRes=await fetch(
      SURL+'/rest/v1/artwall_compositions?select=id,author_name,created_at&order=created_at.desc',
      {headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Prefer':'count=exact'}}
    );
    const metaData=await metaRes.json();
    
    if(!Array.isArray(metaData)||!metaData.length){
      wg.innerHTML='<div class="aw-we">no compositions yet — be the first</div>';
      document.getElementById('wpager').style.display='none';
      return;
    }

    wallTotal=metaData.length;
    const totalPages=Math.ceil(wallTotal/WALL_PER_PAGE);
    
    // Paginate the metadata
    const pageRows=metaData.slice(page*WALL_PER_PAGE, (page+1)*WALL_PER_PAGE);
    
    // Update pager
    const prevBtn=document.getElementById('wprev');
    const nextBtn=document.getElementById('wnext');
    const pageEl=document.getElementById('wpage');
    prevBtn.style.display=page>0?'':'none';
    nextBtn.style.display=page<totalPages-1?'':'none';
    pageEl.textContent=totalPages>1?(page+1)+' / '+totalPages:'';
    document.getElementById('wpager').style.display=totalPages>1?'flex':'none';
    
    prevBtn.onclick=()=>loadWall(page-1);
    nextBtn.onclick=()=>loadWall(page+1);

    // Step 2: build grid with placeholder cards immediately
    wg.innerHTML='';
    const cardMap={};
    pageRows.forEach(row=>{
      const item=document.createElement('div');item.className='aw-wi';
      const thumb=document.createElement('div');thumb.className='aw-wt';
      thumb.style.background='#e8e0d4'; // placeholder color while loading
      thumb.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.35rem;letter-spacing:2px;text-transform:uppercase;color:#b0a890;">loading...</div>';
      const nameEl=document.createElement('div');nameEl.className='aw-wn';
      nameEl.textContent=(row.author_name&&row.author_name!=='anonymous')?row.author_name:'';
      const delBtn=document.createElement('button');delBtn.className='aw-wd';delBtn.textContent='remove';
      delBtn.addEventListener('click',async e=>{
        e.stopPropagation();
        const pw=prompt('Enter password to remove:');
        if(pw!==DPASS){toast('incorrect password');return;}
        try{
          const r=await fetch(SURL+'/rest/v1/artwall_compositions?id=eq.'+row.id,{
            method:'DELETE',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
          });
          if(r.ok||r.status===204){toast('removed');loadWall(page);}
          else toast('could not remove');
        }catch(ex){toast('error');}
      });
      item.appendChild(thumb);item.appendChild(nameEl);item.appendChild(delBtn);
      wg.appendChild(item);
      cardMap[row.id]=thumb;
    });

    // Step 3: fetch image_data ONE AT A TIME so we never overwhelm the parser
    for(const row of pageRows){
      try{
        const imgRes=await fetch(
          SURL+'/rest/v1/artwall_compositions?select=id,image_data&id=eq.'+row.id,
          {headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}}
        );
        const imgData=await imgRes.json();
        if(Array.isArray(imgData)&&imgData[0]&&imgData[0].image_data){
          const thumb=cardMap[row.id];
          if(thumb){
            const img=document.createElement('img');
            img.src=imgData[0].image_data;
            img.alt='';
            img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';
            thumb.innerHTML='';
            thumb.appendChild(img);
            thumb.addEventListener('click',()=>openLb(imgData[0].image_data,row.author_name||''));
          }
        }
      }catch(imgErr){
        console.warn('Image load failed for',row.id,imgErr);
      }
    }

  }catch(e){
    wg.innerHTML='<div class="aw-we">error: '+e.message+'</div>';
  }
}

loadWall(0);

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;S.ac();

});
